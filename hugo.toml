baseURL = "https://liweicong2016-collab.github.io/tech-blog/"
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false

[languages]
  [languages.zh]
    label = "中文"
    weight = 1
    title = "Livius's Tech Pulse"
    [languages.zh.params]
      description = "AI · 算力 · 半导体 · 东南亚市场"
  [languages.en]
    label = "English"
    weight = 2
    title = "Livius's Tech Pulse"
    [languages.en.params]
      description = "AI · Compute · Semiconductors · Southeast Asia"
  [languages.vi]
    label = "Tiếng Việt"
    weight = 3
    title = "Livius's Tech Pulse"
    [languages.vi.params]
      description = "AI · Điện toán · Bán dẫn · Thị trường Đông Nam Á"
  [languages.ja]
    label = "日本語"
    weight = 4
    title = "Livius's Tech Pulse"
    [languages.ja.params]
      description = "AI · コンピューティング · 半導体 · 東南アジア市場"

title = "Livius's Tech Pulse"
name = "Livius's Tech Pulse"
enableRobotsTXT = true
enableGitInfo = false
hasCJKLanguage = true
pygmentsUseClasses = true

theme = ["PaperMod"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[build]
  writeStats = true

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[params]
  env = "production"
  description = "AI · 算力 · 半导体 · 东南亚市场"
  author = "Tech Observer"
  license = "MIT"
  licenseURL = ""
  mainSections = ["posts"]

  useShortcodeInfo = false
  displayName = "Livius's Tech Pulse"

  homeInfoParams = {}
  socialLabels = {}

  customCSS = ["css/custom.css"]

  [params.label]
    text = "Livius's Tech Pulse"


  # PaperMod cover
  cover.imageWithParticles = false

  # PaperMod params
  ShowBreadCrumbs = false
  ShowDraftsLabel = false
  ShowReadingTime = true
  Showtoc = true
  invertTOC = true
  tocOpen = false
  ShowPostNavLinks = true
  ShowCommentsButton = false
  ShowCodeCopyButtons = true
  defaultTheme = "light"

  [params.PaperMod]
    showupanimation = true
    disableSmoothScroll = false
    hideFooter = false
    showHero = true
    heroText = ["Livius's Tech Pulse"]
    cover.imageTitle = true

  # No comments
  commentsProvider = ""

  # Links
  [[params.links]]
    name = "GitHub"
    url = "https://github.com/liweicong2016-collab"
    icon = "github"
