baseURL = "https://liweicong2016-collab.github.io/tech-blog/"
languageCode = "zh-cn"
title = "Livius's Tech Pulse"
name = "Livius's Tech Pulse"
enableRobotsTXT = true
enableGitInfo = false
hasCJKLanguage = true
pygmentsUseClasses = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

theme = ["PaperMod"]

[build]
  writeStats = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[params]
  env = "production"
  description = "AI · 算力 · 半导体 · 东南亚市场"
  author = "Tech Observer"
  license = "MIT"
  licenseURL = ""

  useShortcodeInfo = false
  displayName = "Livius's Tech Pulse"

  homeInfoParams = {}
  socialLabels = {}

  customCSS = ["/css/custom.css"]

  [params.assets]
    disableHLJS = false
    favicon = "/favicon.svg"

  [params.label]
    text = "Livius's Tech Pulse"
    icon = "/favicon.svg"
    iconHeight = 35

  # PaperMod cover
  cover.imageWithParticles = false

  # PaperMod params
  ShowBreadCrumbs = false
  ShowDraftsLabel = false
  ShowReadingTime = true
  Showtoc = true
  invertTOC = true
  tocOpen = false
  ShowPostNavLinks = true
  ShowCommentsButton = false
  ShowCodeCopyButtons = true

  [params.PaperMod]
    showupanimation = true
    disableSmoothScroll = false
    hideFooter = false
    showHero = true
    heroText = ["Livius's Tech Pulse"]
    cover.imageTitle = true

  # No comments
  commentsProvider = ""

  # Links
  [[params.links]]
    name = "GitHub"
    url = "https://github.com/liweicong2016-collab"
    icon = "github"
