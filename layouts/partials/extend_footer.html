<div class="lang-toast" id="langToast"></div>
<script>
(function(){
  var sw = document.querySelector('.lang-switch');
  if (!sw) return;
  var pageUrl = window.location.href;
  // Detect current source lang from data-current attribute (set by lang-switcher.html)
  var currentLang = (sw.getAttribute('data-current') || 'zh').toLowerCase();
  function showToast(msg, dur) {
    var t = document.getElementById('langToast');
    if (!t) return;
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, dur || 1400);
  }
  function setActive(btn) {
    sw.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  }
  function gtUrl(lang) {
    // sl = source language code, tl = target language code
    // Using "auto" lets Google detect source automatically (works for any current page)
    return 'https://translate.google.com/translate?sl=auto&tl=' + lang + '&u=' + encodeURIComponent(pageUrl);
  }
  // Set hrefs to GT URLs for non-zh buttons; zh button = current page
  var zh = sw.querySelector('[data-lang="zh"]');
  var en = sw.querySelector('[data-lang="en"]');
  var ja = sw.querySelector('[data-lang="ja"]');
  var vi = sw.querySelector('[data-lang="vi"]');
  if (zh) zh.href = pageUrl;
  if (en) en.href = gtUrl('en');
  if (ja) ja.href = gtUrl('ja');
  if (vi) vi.href = gtUrl('vi');

  sw.querySelectorAll('.lang-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      var lang = this.getAttribute('data-lang');
      setActive(this);
      if (lang === 'zh') {
        // zh button has no target="_blank" so prevent navigation if same page
        if (this.getAttribute('href') === pageUrl || this.getAttribute('href') === '#' || this.getAttribute('href') === '') {
          e.preventDefault();
          showToast('当前已是中文 / Already Chinese', 1200);
        }
        return;
      }
      showToast('Opening Google Translate... / 正在打开 Google 翻译', 1400);
      // Let the <a target="_blank" href> open in new tab naturally.
    });
  });
})();
</script>
