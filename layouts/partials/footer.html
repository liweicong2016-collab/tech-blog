{{- if not (.Param "hideFooter") }}
<footer class="footer">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div style="display:flex;align-items:center;gap:16px;">
        <span>&copy; {{ now.Year }} <a href="{{ "" | absLangURL }}">{{ site.Title }}</a></span>
        <span style="color:var(--fg-muted);">·</span>
        <span style="font-size:12px;">{{ i18n "powered_by" | default "Powered by" }} <a href="https://gohugo.io/" rel="noopener" target="_blank">Hugo</a> & <a href="https://github.com/adityatelange/hugo-PaperMod/" rel="noopener" target="_blank">PaperMod</a></span>
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        {{- with site.Params.footer.text }}{{ . | markdownify }}{{- end }}
      </div>
    </div>
  </div>
</footer>
{{- end }}

<a href="#top" id="top-link" class="top-link hidden" aria-label="go to top" title="Go to Top (Alt + G)" accesskey="g">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
    <polyline points="17 11 12 6 7 11"></polyline>
    <polyline points="17 18 12 13 7 18"></polyline>
  </svg>
</a>

{{- partial "extend_footer.html" . }}

<script>
  // Scroll to top
  var toplink = document.getElementById("top-link");
  window.onscroll = function () {
    if (document.body.scrollTop > window.innerHeight * 0.5 || document.documentElement.scrollTop > window.innerHeight * 0.5) {
      toplink && toplink.classList.remove("hidden");
    } else {
      toplink && toplink.classList.add("hidden");
    }
  };

  // Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
    anchor.addEventListener("click", function(e) {
      e.preventDefault();
      var id = this.getAttribute("href").substr(1);
      if (!id || id === "top") {
        window.scrollTo({ top: 0, behavior: "smooth" });
      } else {
        var target = document.querySelector("[id='" + decodeURIComponent(id) + "']");
        target && target.scrollIntoView({ behavior: "smooth" });
      }
    });
  });

  // Theme toggle
  document.getElementById("theme-toggle") && document.getElementById("theme-toggle").addEventListener("click", function() {
    var html = document.querySelector("html");
    if (html.dataset.theme === "dark") {
      html.dataset.theme = "light";
      localStorage.setItem("pref-theme", "light");
    } else {
      html.dataset.theme = "dark";
      localStorage.setItem("pref-theme", "dark");
    }
  });
</script>
