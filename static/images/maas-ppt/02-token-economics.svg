<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="1200" height="675" fill="#121418"/>

  <text x="600" y="55" fill="#DDE2E8" font-size="34" font-weight="700" text-anchor="middle">Token = usage + pricing + compute</text>
  <text x="600" y="85" fill="#8B92A0" font-size="16" text-anchor="middle">收入设计与推理成本耦合的底层公式</text>

  <!-- 3 input boxes -->
  <g>
    <!-- USAGE -->
    <rect x="80" y="180" width="280" height="180" rx="12" fill="#1A1E26" stroke="#79B8FF" stroke-width="2"/>
    <text x="220" y="220" fill="#79B8FF" font-size="28" font-weight="700" text-anchor="middle">usage</text>
    <text x="220" y="250" fill="#8B92A0" font-size="14" text-anchor="middle">调用量 / 上下文 / 模式</text>
    <line x1="120" y1="270" x2="320" y2="270" stroke="#3A4048" stroke-width="1"/>
    <text x="120" y="295" fill="#DDE2E8" font-size="13">· 输入 / 输出分别计</text>
    <text x="120" y="318" fill="#DDE2E8" font-size="13">· 长上下文 + 思考模式</text>
    <text x="120" y="341" fill="#DDE2E8" font-size="13">· Token Plan 锁高频</text>

    <!-- PRICING -->
    <rect x="460" y="180" width="280" height="180" rx="12" fill="#1A1E26" stroke="#C778C0" stroke-width="2"/>
    <text x="600" y="220" fill="#C778C0" font-size="28" font-weight="700" text-anchor="middle">pricing</text>
    <text x="600" y="250" fill="#8B92A0" font-size="14" text-anchor="middle">价格梯度 / 套餐 / 折扣</text>
    <line x1="500" y1="270" x2="700" y2="270" stroke="#3A4048" stroke-width="1"/>
    <text x="500" y="295" fill="#DDE2E8" font-size="13">· 输出 Token 更贵</text>
    <text x="500" y="318" fill="#DDE2E8" font-size="13">· Batch / 缓存折扣</text>
    <text x="500" y="341" fill="#DDE2E8" font-size="13">· 包年包月锁收入</text>

    <!-- COMPUTE -->
    <rect x="840" y="180" width="280" height="180" rx="12" fill="#1A1E26" stroke="#A8FFB0" stroke-width="2"/>
    <text x="980" y="220" fill="#A8FFB0" font-size="28" font-weight="700" text-anchor="middle">compute</text>
    <text x="980" y="250" fill="#8B92A0" font-size="14" text-anchor="middle">GPU / 芯片 / 网络 / 电力</text>
    <line x1="880" y1="270" x2="1080" y2="270" stroke="#3A4048" stroke-width="1"/>
    <text x="880" y="295" fill="#DDE2E8" font-size="13">· 国产 AI 芯片供给</text>
    <text x="880" y="318" fill="#DDE2E8" font-size="13">· 蒸馏 + 路由压成本</text>
    <text x="880" y="341" fill="#DDE2E8" font-size="13">· Agent 链放大消耗</text>
  </g>

  <!-- Arrows down to Token output -->
  <g stroke="#5A6170" stroke-width="2" fill="none">
    <path d="M 220 360 L 220 430" marker-end="url(#arrow)"/>
    <path d="M 600 360 L 600 430" marker-end="url(#arrow)"/>
    <path d="M 980 360 L 980 430" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#5A6170"/>
    </marker>
  </defs>

  <!-- TOKEN output box -->
  <rect x="350" y="430" width="500" height="100" rx="16" fill="#79B8FF" opacity="0.15" stroke="#79B8FF" stroke-width="3"/>
  <text x="600" y="478" fill="#79B8FF" font-size="36" font-weight="700" text-anchor="middle">Token 收入与成本</text>
  <text x="600" y="510" fill="#DDE2E8" font-size="14" text-anchor="middle">MaaS 厂商真正的"账本"</text>

  <!-- Bottom: key metric triplet -->
  <g transform="translate(0, 580)">
    <text x="180" y="0" fill="#79B8FF" font-size="14" text-anchor="middle">每百万 Token 单价</text>
    <text x="180" y="22" fill="#8B92A0" font-size="12" text-anchor="middle">决定开发者门槛</text>

    <text x="600" y="0" fill="#C778C0" font-size="14" text-anchor="middle">单位推理成本</text>
    <text x="600" y="22" fill="#8B92A0" font-size="12" text-anchor="middle">决定毛利弹性</text>

    <text x="1020" y="0" fill="#A8FFB0" font-size="14" text-anchor="middle">Token 留存率</text>
    <text x="1020" y="22" fill="#8B92A0" font-size="12" text-anchor="middle">决定转生产</text>
  </g>
</svg>
