<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="1200" height="675" fill="#121418"/>

  <text x="600" y="55" fill="#DDE2E8" font-size="34" font-weight="700" text-anchor="middle">阿里云百炼</text>
  <text x="600" y="85" fill="#8B92A0" font-size="16" text-anchor="middle">让 AI 成为云的增长层</text>

  <!-- Hero: 6x in 3 months -->
  <g transform="translate(600, 175)">
    <!-- Bar chart: 1x, 3x, 6x -->
    <line x1="-220" y1="80" x2="220" y2="80" stroke="#3A4048" stroke-width="2"/>
    <line x1="-220" y1="80" x2="-220" y2="-120" stroke="#3A4048" stroke-width="2"/>

    <!-- Month 0 -->
    <rect x="-200" y="50" width="100" height="30" fill="#C778C0" opacity="0.4"/>
    <text x="-150" y="105" fill="#8B92A0" font-size="12" text-anchor="middle">M0</text>
    <text x="-150" y="38" fill="#C778C0" font-size="14" text-anchor="middle" font-weight="700">1×</text>

    <!-- Month 1.5 -->
    <rect x="-50" y="-10" width="100" height="90" fill="#C778C0" opacity="0.7"/>
    <text x="0" y="105" fill="#8B92A0" font-size="12" text-anchor="middle">M+1.5</text>
    <text x="0" y="-22" fill="#C778C0" font-size="14" text-anchor="middle" font-weight="700">3×</text>

    <!-- Month 3 -->
    <rect x="100" y="-90" width="100" height="170" fill="#C778C0"/>
    <text x="150" y="105" fill="#8B92A0" font-size="12" text-anchor="middle">M+3</text>
    <text x="150" y="-105" fill="#C778C0" font-size="20" text-anchor="middle" font-weight="700">6×</text>

    <text x="0" y="135" fill="#DDE2E8" font-size="14" text-anchor="middle">百炼公共模型服务 Token 消耗增长曲线</text>
  </g>

  <!-- Price structure layers -->
  <g transform="translate(0, 360)">
    <text x="600" y="0" fill="#DDE2E8" font-size="18" font-weight="700" text-anchor="middle">Qwen 价格梯度（按四维度分层）</text>

    <g transform="translate(80, 30)">
      <!-- Context length axis -->
      <rect x="0" y="0" width="250" height="70" rx="6" fill="#1A1E26" stroke="#79B8FF" stroke-width="1.5"/>
      <text x="125" y="25" fill="#79B8FF" font-size="13" font-weight="700" text-anchor="middle">上下文长度</text>
      <text x="125" y="48" fill="#DDE2E8" font-size="11" text-anchor="middle">8K → 128K → 1M</text>

      <!-- IO axis -->
      <rect x="270" y="0" width="250" height="70" rx="6" fill="#1A1E26" stroke="#A8FFB0" stroke-width="1.5"/>
      <text x="395" y="25" fill="#A8FFB0" font-size="13" font-weight="700" text-anchor="middle">输入 / 输出</text>
      <text x="395" y="48" fill="#DDE2E8" font-size="11" text-anchor="middle">输出 ≈ 输入 ×3-5</text>

      <!-- Mode axis -->
      <rect x="540" y="0" width="250" height="70" rx="6" fill="#1A1E26" stroke="#C778C0" stroke-width="1.5"/>
      <text x="665" y="25" fill="#C778C0" font-size="13" font-weight="700" text-anchor="middle">思考模式</text>
      <text x="665" y="48" fill="#DDE2E8" font-size="11" text-anchor="middle">标准 / 深度 / 多模态</text>

      <!-- Discount axis -->
      <rect x="810" y="0" width="250" height="70" rx="6" fill="#1A1E26" stroke="#FFD580" stroke-width="1.5"/>
      <text x="935" y="25" fill="#FFD580" font-size="13" font-weight="700" text-anchor="middle">折扣 / 缓存</text>
      <text x="935" y="48" fill="#DDE2E8" font-size="11" text-anchor="middle">Batch + 上下文缓存</text>
    </g>
  </g>

  <!-- Full-stack narrative -->
  <g transform="translate(0, 500)">
    <text x="600" y="0" fill="#DDE2E8" font-size="18" font-weight="700" text-anchor="middle">全栈叙事：把 Token 收入与云资源消耗绑定</text>
    <g transform="translate(150, 30)">
      <rect x="0" y="0" width="170" height="50" rx="6" fill="#1A1E26" stroke="#79B8FF" stroke-width="1"/>
      <text x="85" y="30" fill="#79B8FF" font-size="12" text-anchor="middle">AI Infra / 芯片</text>

      <text x="195" y="30" fill="#5A6170" font-size="20" text-anchor="middle">→</text>

      <rect x="220" y="0" width="150" height="50" rx="6" fill="#1A1E26" stroke="#A8FFB0" stroke-width="1"/>
      <text x="295" y="30" fill="#A8FFB0" font-size="12" text-anchor="middle">Qwen 模型</text>

      <text x="395" y="30" fill="#5A6170" font-size="20" text-anchor="middle">→</text>

      <rect x="420" y="0" width="170" height="50" rx="6" fill="#1A1E26" stroke="#C778C0" stroke-width="1"/>
      <text x="505" y="30" fill="#C778C0" font-size="12" text-anchor="middle">百炼 MaaS 平台</text>

      <text x="615" y="30" fill="#5A6170" font-size="20" text-anchor="middle">→</text>

      <rect x="640" y="0" width="160" height="50" rx="6" fill="#1A1E26" stroke="#FFD580" stroke-width="1"/>
      <text x="720" y="30" fill="#FFD580" font-size="12" text-anchor="middle">千问应用</text>
    </g>
  </g>

  <text x="600" y="640" fill="#5A6170" font-size="12" text-anchor="middle">来源：阿里云百炼官方价格页 / 新浪财经 / 每经网 (2026)</text>
</svg>
