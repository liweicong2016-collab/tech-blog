<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="1200" height="675" fill="#121418"/>

  <text x="600" y="50" fill="#DDE2E8" font-size="30" font-weight="700" text-anchor="middle">三家从不同需求控制点切入</text>
  <text x="600" y="78" fill="#8B92A0" font-size="14" text-anchor="middle">5 维度对比矩阵</text>

  <!-- Heatmap table -->
  <g transform="translate(40, 110)">
    <!-- Header row -->
    <rect x="0" y="0" width="280" height="50" rx="6" fill="#1A1E26" stroke="#3A4048" stroke-width="1"/>
    <text x="140" y="32" fill="#DDE2E8" font-size="14" font-weight="700" text-anchor="middle">维度 / 公司</text>

    <rect x="290" y="0" width="280" height="50" rx="6" fill="#1A1E26" stroke="#79B8FF" stroke-width="2"/>
    <text x="430" y="32" fill="#79B8FF" font-size="15" font-weight="700" text-anchor="middle">字节</text>

    <rect x="580" y="0" width="280" height="50" rx="6" fill="#1A1E26" stroke="#C778C0" stroke-width="2"/>
    <text x="720" y="32" fill="#C778C0" font-size="15" font-weight="700" text-anchor="middle">阿里</text>

    <rect x="870" y="0" width="280" height="50" rx="6" fill="#1A1E26" stroke="#A8FFB0" stroke-width="2"/>
    <text x="1010" y="32" fill="#A8FFB0" font-size="15" font-weight="700" text-anchor="middle">腾讯</text>

    <!-- Row 1: 核心入口 -->
    <g transform="translate(0, 60)">
      <rect x="0" y="0" width="280" height="80" rx="6" fill="#1A1E26" stroke="#3A4048" stroke-width="1"/>
      <text x="140" y="46" fill="#DDE2E8" font-size="14" text-anchor="middle">核心入口</text>

      <rect x="290" y="0" width="280" height="80" rx="6" fill="#79B8FF" opacity="0.12" stroke="#79B8FF" stroke-width="1.5"/>
      <text x="430" y="46" fill="#DDE2E8" font-size="12" text-anchor="middle">豆包 · 抖音 · 即梦</text>

      <rect x="580" y="0" width="280" height="80" rx="6" fill="#C778C0" opacity="0.12" stroke="#C778C0" stroke-width="1.5"/>
      <text x="720" y="46" fill="#DDE2E8" font-size="12" text-anchor="middle">百炼 · 千问 · 企业云</text>

      <rect x="870" y="0" width="280" height="80" rx="6" fill="#A8FFB0" opacity="0.12" stroke="#A8FFB0" stroke-width="1.5"/>
      <text x="1010" y="46" fill="#DDE2E8" font-size="12" text-anchor="middle">TokenHub · 微信 · 企微</text>
    </g>

    <!-- Row 2: Token 增长来源 -->
    <g transform="translate(0, 150)">
      <rect x="0" y="0" width="280" height="80" rx="6" fill="#1A1E26" stroke="#3A4048" stroke-width="1"/>
      <text x="140" y="46" fill="#DDE2E8" font-size="14" text-anchor="middle">Token 增长来源</text>

      <rect x="290" y="0" width="280" height="80" rx="6" fill="#79B8FF" opacity="0.12" stroke="#79B8FF" stroke-width="1.5"/>
      <text x="430" y="40" fill="#DDE2E8" font-size="12" text-anchor="middle">C 端高频交互</text>
      <text x="430" y="58" fill="#DDE2E8" font-size="12" text-anchor="middle">编程 Agent</text>

      <rect x="580" y="0" width="280" height="80" rx="6" fill="#C778C0" opacity="0.12" stroke="#C778C0" stroke-width="1.5"/>
      <text x="720" y="40" fill="#DDE2E8" font-size="12" text-anchor="middle">企业应用 + 开源</text>
      <text x="720" y="58" fill="#DDE2E8" font-size="12" text-anchor="middle">云上 AI 工作流</text>

      <rect x="870" y="0" width="280" height="80" rx="6" fill="#A8FFB0" opacity="0.12" stroke="#A8FFB0" stroke-width="1.5"/>
      <text x="1010" y="40" fill="#DDE2E8" font-size="12" text-anchor="middle">企业协作</text>
      <text x="1010" y="58" fill="#DDE2E8" font-size="12" text-anchor="middle">微信生态 + 第三方</text>
    </g>

    <!-- Row 3: 定价风格 -->
    <g transform="translate(0, 240)">
      <rect x="0" y="0" width="280" height="80" rx="6" fill="#1A1E26" stroke="#3A4048" stroke-width="1"/>
      <text x="140" y="46" fill="#DDE2E8" font-size="14" text-anchor="middle">定价风格</text>

      <rect x="290" y="0" width="280" height="80" rx="6" fill="#79B8FF" opacity="0.12" stroke="#79B8FF" stroke-width="1.5"/>
      <text x="430" y="40" fill="#DDE2E8" font-size="12" text-anchor="middle">高性价比</text>
      <text x="430" y="58" fill="#DDE2E8" font-size="12" text-anchor="middle">低门槛计划</text>

      <rect x="580" y="0" width="280" height="80" rx="6" fill="#C778C0" opacity="0.12" stroke="#C778C0" stroke-width="1.5"/>
      <text x="720" y="40" fill="#DDE2E8" font-size="12" text-anchor="middle">分层透明</text>
      <text x="720" y="58" fill="#DDE2E8" font-size="12" text-anchor="middle">Batch / 缓存折扣</text>

      <rect x="870" y="0" width="280" height="80" rx="6" fill="#A8FFB0" opacity="0.12" stroke="#A8FFB0" stroke-width="1.5"/>
      <text x="1010" y="40" fill="#DDE2E8" font-size="12" text-anchor="middle">套餐锁价</text>
      <text x="1010" y="58" fill="#DDE2E8" font-size="12" text-anchor="middle">聚合调用优惠</text>
    </g>

    <!-- Row 4: 最大机会 -->
    <g transform="translate(0, 330)">
      <rect x="0" y="0" width="280" height="80" rx="6" fill="#1A1E26" stroke="#3A4048" stroke-width="1"/>
      <text x="140" y="46" fill="#DDE2E8" font-size="14" text-anchor="middle">最大机会</text>

      <rect x="290" y="0" width="280" height="80" rx="6" fill="#79B8FF" opacity="0.12" stroke="#79B8FF" stroke-width="1.5"/>
      <text x="430" y="46" fill="#DDE2E8" font-size="12" text-anchor="middle">C 端 → 企业 MaaS</text>

      <rect x="580" y="0" width="280" height="80" rx="6" fill="#C778C0" opacity="0.12" stroke="#C778C0" stroke-width="1.5"/>
      <text x="720" y="46" fill="#DDE2E8" font-size="12" text-anchor="middle">MaaS 成阿里云主产品线</text>

      <rect x="870" y="0" width="280" height="80" rx="6" fill="#A8FFB0" opacity="0.12" stroke="#A8FFB0" stroke-width="1.5"/>
      <text x="1010" y="46" fill="#DDE2E8" font-size="12" text-anchor="middle">企业多模型治理入口</text>
    </g>

    <!-- Row 5: 主要风险 -->
    <g transform="translate(0, 420)">
      <rect x="0" y="0" width="280" height="80" rx="6" fill="#1A1E26" stroke="#3A4048" stroke-width="1"/>
      <text x="140" y="46" fill="#DDE2E8" font-size="14" text-anchor="middle">主要风险</text>

      <rect x="290" y="0" width="280" height="80" rx="6" fill="#FF6B6B" opacity="0.12" stroke="#FF6B6B" stroke-width="1.5"/>
      <text x="430" y="46" fill="#DDE2E8" font-size="12" text-anchor="middle">企业交付 + 合规心智</text>

      <rect x="580" y="0" width="280" height="80" rx="6" fill="#FF6B6B" opacity="0.12" stroke="#FF6B6B" stroke-width="1.5"/>
      <text x="720" y="46" fill="#DDE2E8" font-size="12" text-anchor="middle">价格战 + 算力成本</text>

      <rect x="870" y="0" width="280" height="80" rx="6" fill="#FF6B6B" opacity="0.12" stroke="#FF6B6B" stroke-width="1.5"/>
      <text x="1010" y="46" fill="#DDE2E8" font-size="12" text-anchor="middle">聚合稀释自研差异化</text>
    </g>
  </g>

  <text x="600" y="655" fill="#5A6170" font-size="11" text-anchor="middle">战略对比基于公开产品定位 · 价格页 · 2026 年公开报道</text>
</svg>
