<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="1200" height="675" fill="#121418"/>

  <text x="600" y="50" fill="#DDE2E8" font-size="30" font-weight="700" text-anchor="middle">Token 经济重塑云 · 软件 · 开发者</text>
  <text x="600" y="78" fill="#8B92A0" font-size="14" text-anchor="middle">四类利益相关方的影响</text>

  <!-- 4 quadrant layout -->
  <g transform="translate(40, 110)">
    <!-- Top-left: 云厂商 -->
    <rect x="0" y="0" width="555" height="245" rx="10" fill="#1A1E26" stroke="#79B8FF" stroke-width="2"/>
    <text x="30" y="40" fill="#79B8FF" font-size="20" font-weight="700">对云厂商</text>
    <line x1="30" y1="50" x2="525" y2="50" stroke="#3A4048" stroke-width="1"/>
    <text x="30" y="80" fill="#DDE2E8" font-size="13">· MaaS = 云资源的新前台</text>
    <text x="30" y="108" fill="#DDE2E8" font-size="13">· 绑定 GPU / 存储 / 网络 / 数据安全</text>
    <text x="30" y="136" fill="#DDE2E8" font-size="13">· 价格战不可避免</text>
    <text x="30" y="164" fill="#DDE2E8" font-size="13">· 关键能力：缓存 · Batch · 路由 · 自研芯片</text>
    <rect x="30" y="185" width="495" height="40" rx="6" fill="#79B8FF" opacity="0.12"/>
    <text x="277" y="210" fill="#79B8FF" font-size="13" font-weight="700" text-anchor="middle">谁掌握 Token 流量，谁掌握云未来</text>

    <!-- Top-right: 企业客户 -->
    <rect x="570" y="0" width="555" height="245" rx="10" fill="#1A1E26" stroke="#C778C0" stroke-width="2"/>
    <text x="600" y="40" fill="#C778C0" font-size="20" font-weight="700">对企业客户</text>
    <line x1="600" y1="50" x2="1095" y2="50" stroke="#3A4048" stroke-width="1"/>
    <text x="600" y="80" fill="#DDE2E8" font-size="13">· 采购标准从榜单分转向 TCO</text>
    <text x="600" y="108" fill="#DDE2E8" font-size="13">· 总拥有成本 · 稳定性 · 数据隔离</text>
    <text x="600" y="136" fill="#DDE2E8" font-size="13">· Agent 项目要建 Token 预算</text>
    <text x="600" y="164" fill="#DDE2E8" font-size="13">· 效果归因 + 自动降级策略</text>
    <rect x="600" y="185" width="495" height="40" rx="6" fill="#C778C0" opacity="0.12"/>
    <text x="847" y="210" fill="#C778C0" font-size="13" font-weight="700" text-anchor="middle">企业级 AI 采购进入"工程师视角"</text>

    <!-- Bottom-left: 开发者 -->
    <rect x="0" y="265" width="555" height="245" rx="10" fill="#1A1E26" stroke="#A8FFB0" stroke-width="2"/>
    <text x="30" y="305" fill="#A8FFB0" font-size="20" font-weight="700">对开发者</text>
    <line x1="30" y1="315" x2="525" y2="315" stroke="#3A4048" stroke-width="1"/>
    <text x="30" y="345" fill="#DDE2E8" font-size="13">· 多模型路由 = 基本功</text>
    <text x="30" y="373" fill="#DDE2E8" font-size="13">· 提示词缓存 · 上下文压缩</text>
    <text x="30" y="401" fill="#DDE2E8" font-size="13">· 结果复用 = 应用利润率</text>
    <rect x="30" y="425" width="495" height="40" rx="6" fill="#A8FFB0" opacity="0.12"/>
    <text x="277" y="450" fill="#A8FFB0" font-size="13" font-weight="700" text-anchor="middle">"Token-aware developer" 是新物种</text>

    <!-- Bottom-right: 投资者 -->
    <rect x="570" y="265" width="555" height="245" rx="10" fill="#1A1E26" stroke="#FFD580" stroke-width="2"/>
    <text x="600" y="305" fill="#FFD580" font-size="20" font-weight="700">对投资者</text>
    <line x1="600" y1="315" x2="1095" y2="315" stroke="#3A4048" stroke-width="1"/>
    <text x="600" y="345" fill="#DDE2E8" font-size="13">· 跟踪 Token 消耗 + 付费留存</text>
    <text x="600" y="373" fill="#DDE2E8" font-size="13">· 单位推理成本 · AI 云收入占比</text>
    <text x="600" y="401" fill="#DDE2E8" font-size="13">· 不只看模型发布节奏</text>
    <rect x="600" y="425" width="495" height="40" rx="6" fill="#FFD580" opacity="0.12"/>
    <text x="847" y="450" fill="#FFD580" font-size="13" font-weight="700" text-anchor="middle">AI 投资的 KPI 时代来临</text>
  </g>

  <text x="600" y="650" fill="#5A6170" font-size="11" text-anchor="middle">面向云厂商 · 企业客户 · 开发者 · 投资者四类视角 (2026)</text>
</svg>
