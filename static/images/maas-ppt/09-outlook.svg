<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif">
  <rect width="1200" height="675" fill="#121418"/>

  <text x="600" y="55" fill="#DDE2E8" font-size="34" font-weight="700" text-anchor="middle">2026-2027 展望</text>
  <text x="600" y="85" fill="#8B92A0" font-size="16" text-anchor="middle">从低价普惠到效率分层</text>

  <!-- Timeline axis -->
  <g transform="translate(0, 200)">
    <line x1="100" y1="200" x2="1100" y2="200" stroke="#3A4048" stroke-width="3"/>

    <!-- 3 milestones -->
    <g transform="translate(250, 200)">
      <circle cx="0" cy="0" r="14" fill="#79B8FF"/>
      <text x="0" y="-30" fill="#79B8FF" font-size="14" font-weight="700" text-anchor="middle">2026 H1</text>
      <text x="0" y="50" fill="#DDE2E8" font-size="14" text-anchor="middle">价格分层确立</text>
      <text x="0" y="75" fill="#8B92A0" font-size="12" text-anchor="middle">旗舰涨价/稳价</text>
      <text x="0" y="93" fill="#8B92A0" font-size="12" text-anchor="middle">Lite/Mini 普惠</text>
    </g>

    <g transform="translate(600, 200)">
      <circle cx="0" cy="0" r="14" fill="#C778C0"/>
      <text x="0" y="-30" fill="#C778C0" font-size="14" font-weight="700" text-anchor="middle">2026 H2</text>
      <text x="0" y="50" fill="#DDE2E8" font-size="14" text-anchor="middle">企业 MaaS 转生产</text>
      <text x="0" y="75" fill="#8B92A0" font-size="12" text-anchor="middle">Agent / 客服 / 代码</text>
      <text x="0" y="93" fill="#8B92A0" font-size="12" text-anchor="middle">营销内容先放量</text>
    </g>

    <g transform="translate(950, 200)">
      <circle cx="0" cy="0" r="14" fill="#A8FFB0"/>
      <text x="0" y="-30" fill="#A8FFB0" font-size="14" font-weight="700" text-anchor="middle">2027 H1</text>
      <text x="0" y="50" fill="#DDE2E8" font-size="14" text-anchor="middle">平台卖治理</text>
      <text x="0" y="75" fill="#8B92A0" font-size="12" text-anchor="middle">模型市场 / 审计</text>
      <text x="0" y="93" fill="#8B92A0" font-size="12" text-anchor="middle">路由 / 成本控制</text>
    </g>
  </g>

  <!-- Suggestions (3 roles) -->
  <g transform="translate(40, 410)">
    <rect x="0" y="0" width="370" height="220" rx="10" fill="#1A1E26" stroke="#79B8FF" stroke-width="2"/>
    <text x="185" y="35" fill="#79B8FF" font-size="18" font-weight="700" text-anchor="middle">厂商</text>
    <line x1="30" y1="50" x2="340" y2="50" stroke="#3A4048" stroke-width="1"/>
    <text x="30" y="80" fill="#DDE2E8" font-size="13">· Token Plan 锁高频开发者</text>
    <text x="30" y="108" fill="#DDE2E8" font-size="13">· 公开 SLA</text>
    <text x="30" y="136" fill="#DDE2E8" font-size="13">· 公开成本优化能力</text>
    <text x="30" y="164" fill="#DDE2E8" font-size="13">· 自研芯片 + 调度能力</text>
    <text x="30" y="192" fill="#A8FFB0" font-size="12" text-anchor="middle">→ 把 MaaS 做深</text>

    <rect x="385" y="0" width="370" height="220" rx="10" fill="#1A1E26" stroke="#C778C0" stroke-width="2"/>
    <text x="570" y="35" fill="#C778C0" font-size="18" font-weight="700" text-anchor="middle">企业</text>
    <line x1="415" y1="50" x2="725" y2="50" stroke="#3A4048" stroke-width="1"/>
    <text x="415" y="80" fill="#DDE2E8" font-size="13">· 多供应商策略</text>
    <text x="415" y="108" fill="#DDE2E8" font-size="13">· 按任务拆分模型层级</text>
    <text x="415" y="136" fill="#DDE2E8" font-size="13">· 避免单模型成本锁定</text>
    <text x="415" y="164" fill="#DDE2E8" font-size="13">· 建立 Token 预算</text>
    <text x="415" y="192" fill="#A8FFB0" font-size="12" text-anchor="middle">→ 治理能力</text>

    <rect x="770" y="0" width="370" height="220" rx="10" fill="#1A1E26" stroke="#A8FFB0" stroke-width="2"/>
    <text x="955" y="35" fill="#A8FFB0" font-size="18" font-weight="700" text-anchor="middle">开发者</text>
    <line x1="800" y1="50" x2="1110" y2="50" stroke="#3A4048" stroke-width="1"/>
    <text x="800" y="80" fill="#DDE2E8" font-size="13">· Token 成本纳入产品</text>
    <text x="800" y="108" fill="#DDE2E8" font-size="13">· 默认做缓存</text>
    <text x="800" y="136" fill="#DDE2E8" font-size="13">· 上下文压缩</text>
    <text x="800" y="164" fill="#DDE2E8" font-size="13">· 模型路由</text>
    <text x="800" y="192" fill="#A8FFB0" font-size="12" text-anchor="middle">→ 利润率基本功</text>
  </g>

  <text x="600" y="660" fill="#5A6170" font-size="11" text-anchor="middle">2026 H1 → 2027 H1 趋势时间轴 (MaaS 从普惠到分层)</text>
</svg>
