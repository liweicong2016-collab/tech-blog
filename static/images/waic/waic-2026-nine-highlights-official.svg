    <rect x="-35" y="-5" width="40" height="10" rx="2" fill="#7B5CF5" fill-opacity="0.15"/>
    <rect x="-35" y="-20" width="25" height="10" rx="2" fill="#7B5CF5" fill-opacity="0.15"/>
