  <text x="48" y="120" font-family="Arial, sans-serif" font-size="11" fill="#7B5CF5" font-weight="700" letter-spacing="2">01</text>
  <g transform="translate(165,165)" fill="none" stroke="#7B5CF5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-40" y="-30" width="80" height="60" rx="4"/>
    <line x1="-40" y1="-10" x2="40" y2="-10"/>
    <line x1="-40" y1="10" x2="40" y2="10"/>
    <line x1="-20" y1="-30" x2="-20" y2="30"/>
