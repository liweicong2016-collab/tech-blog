<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1426"/>
      <stop offset="100%" stop-color="#0F1D35"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E2A42"/>
      <stop offset="100%" stop-color="#162035"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="borderGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B5CF5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7B5CF5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7B5CF5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="350" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" letter-spacing="5">WAIC 2026 · 盛况空前</text>
  <line x1="350" y1="52" x2="550" y2="52" stroke="url(#lineGrad2)" stroke-width="1"/>

  <!-- Card 1: 800+ 展商 -->
  <rect x="35" y="70" width="195" height="220" rx="12" fill="url(#cardBg)" stroke="#7B5CF5" stroke-opacity="0.2"/>
  <rect x="35" y="70" width="195" height="6" rx="3" fill="url(#goldGrad)" opacity="0.6"/>
  <text x="132" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="url(#goldGrad)" filter="url(#goldGlow)">800+</text>
  <text x="132" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#A8B8D8">展商企业</text>
  <text x="132" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7B5CF5" opacity="0.7">市外及国际占比超50%</text>
  <text x="132" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#A8B8D8" opacity="0.5">800+ Companies</text>

  <!-- Card 2: 7万㎡+ 展览面积 -->
  <rect x="252" y="70" width="195" height="220" rx="12" fill="url(#cardBg)" stroke="#7B5CF5" stroke-opacity="0.2"/>
  <rect x="252" y="70" width="195" height="6" rx="3" fill="url(#goldGrad)" opacity="0.6"/>
  <text x="349" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="url(#goldGrad)" filter="url(#goldGlow)">7万㎡+</text>
  <text x="349" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#A8B8D8">展览面积</text>
  <text x="349" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7B5CF5" opacity="0.7">首次突破历届纪录</text>
  <text x="349" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#A8B8D8" opacity="0.5">70,000+ sqm</text>

  <!-- Card 3: 30+ 国家和地区 -->
  <rect x="469" y="70" width="195" height="220" rx="12" fill="url(#cardBg)" stroke="#7B5CF5" stroke-opacity="0.2"/>
  <rect x="469" y="70" width="195" height="6" rx="3" fill="url(#goldGrad)" opacity="0.6"/>
  <text x="566" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="url(#goldGrad)" filter="url(#goldGlow)">30+</text>
  <text x="566" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#A8B8D8">国家和地区</text>
  <text x="566" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7B5CF5" opacity="0.7">覆盖全球AI主要市场</text>
  <text x="566" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#A8B8D8" opacity="0.5">30+ Countries</text>

  <!-- Card 4: 1500+ 演讲嘉宾 -->
  <rect x="686" y="70" width="195" height="220" rx="12" fill="url(#cardBg)" stroke="#7B5CF5" stroke-opacity="0.2"/>
  <rect x="686" y="70" width="195" height="6" rx="3" fill="url(#goldGrad)" opacity="0.6"/>
  <text x="783" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="url(#goldGrad)" filter="url(#goldGlow)">1500+</text>
  <text x="783" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#A8B8D8">演讲嘉宾</text>
  <text x="783" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7B5CF5" opacity="0.7">含20+顶奖得主</text>
  <text x="783" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#A8B8D8" opacity="0.5">1,500+ Speakers</text>
</svg>